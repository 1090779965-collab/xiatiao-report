<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦐 虾条周报生成器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #333; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; font-size: 14px; }
        label { display: block; margin: 16px 0 8px; color: #444; font-weight: 500; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; transition: border-color 0.3s; }
        input:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { min-height: 80px; resize: vertical; }
        .btn { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        #result { margin-top: 24px; padding: 20px; background: #f8f9fa; border-radius: 8px; display: none; }
        #result h3 { color: #333; margin-bottom: 12px; }
        #resultContent { white-space: pre-wrap; line-height: 1.6; color: #555; }
        .copy-btn { background: #28a745; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦐 虾条周报生成器</h1>
        <p class="subtitle">填写本周工作要点，AI帮你整理成完整周报</p>
        
        <label>📅 周次（如：第12周）</label>
        <input type="text" id="week" placeholder="例如：第12周">
        
        <label>📅 日期范围</label>
        <input type="text" id="dateRange" placeholder="例如：2026.03.03 - 2026.03.09">
        
        <label>✅ 本周完成的工作</label>
        <textarea id="completed" placeholder="1. 完成了xxx项目&#10;2. 整理了xxx文档&#10;3. ..."></textarea>
        
        <label>🔄 正在进行的工作</label>
        <textarea id="ongoing" placeholder="1. xxx项目进行中，预计..."></textarea>
        
        <label>📋 待办事项</label>
        <textarea id="todos" placeholder="1. 完成xxx&#10;2. 跟进xxx..."></textarea>
        
        <label>💡 总结与反思</label>
        <textarea id="summary" placeholder="本周收获、问题、改进建议..."></textarea>
        
        <button class="btn" onclick="generateReport()">✨ 生成周报</button>
        
        <div id="result">
            <h3>📝 生成的周报</h3>
            <div id="resultContent"></div>
            <button class="btn copy-btn" onclick="copyReport()">📋 复制周报</button>
        </div>
    </div>

    <script>
        function generateReport() {
            const week = document.getElementById('week').value || '第12周';
            const dateRange = document.getElementById('dateRange').value || '2026.03.03 - 2026.03.09';
            const completed = document.getElementById('completed').value || '无';
            const ongoing = document.getElementById('ongoing').value || '无';
            const todos = document.getElementById('todos').value || '无';
            const summary = document.getElementById('summary').value || '无';
            
            const report = `# ${week} 工作周报

## 📅 时间范围
${dateRange}

---

## ✅ 本周完成的工作
${completed}

---

## 🔄 正在进行的工作
${ongoing}

---

## 📋 待办事项
${todos}

---

## 💡 总结与反思
${summary}

---

* Generated by 🦐 虾条周报生成器 *`;

            document.getElementById('resultContent').textContent = report;
            document.getElementById('result').style.display = 'block';
        }

        function copyReport() {
            const content = document.getElementById('resultContent').textContent;
            navigator.clipboard.writeText(content).then(() => {
                alert('✅ 周报已复制到剪贴板！');
            });
        }
    </script>
</body>
</html>
